<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Court Courier</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #f7f4ee;
        color: #202124;
      }

      main {
        width: min(94vw, 48rem);
        margin: 0 auto;
        padding: 2rem 0 4rem;
      }

      h1 {
        margin: 0 0 1.25rem;
        font-size: clamp(1.8rem, 4vw, 3rem);
        letter-spacing: 0;
      }

      h2 {
        margin: 0 0 1rem;
        font-size: 1.1rem;
      }

      section,
      form {
        margin-top: 1rem;
        padding: 1.25rem;
        border: 1px solid #d9d1c2;
        border-radius: 8px;
        background: #fffdfa;
      }

      label {
        display: block;
        margin-top: 1rem;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        margin-top: 0.4rem;
        border: 1px solid #c8c0b1;
        border-radius: 6px;
        padding: 0.75rem;
        background: white;
        color: #202124;
        font: inherit;
      }

      textarea {
        min-height: 9rem;
        resize: vertical;
      }

      button {
        min-height: 2.8rem;
        border: 0;
        border-radius: 6px;
        padding: 0 1rem;
        background: #176b5d;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .status {
        min-height: 1.5rem;
        margin-top: 1rem;
        color: #5d5a54;
      }

      .links {
        display: grid;
        gap: 0.75rem;
      }

      .player-link {
        display: grid;
        gap: 0.5rem;
        padding: 0.85rem;
        border: 1px solid #d9d1c2;
        border-radius: 8px;
        background: #f9f6ef;
      }

      .player-link a {
        overflow-wrap: anywhere;
        color: #176b5d;
        font-weight: 700;
      }

      .hidden {
        display: none;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #161616;
          color: #f3f1ec;
        }

        section,
        form {
          border-color: #3a3935;
          background: #22211f;
        }

        input,
        textarea {
          border-color: #504d46;
          background: #171717;
          color: #f3f1ec;
        }

        .status {
          color: #c8c2b8;
        }

        .player-link {
          border-color: #3a3935;
          background: #1b1a19;
        }

        .player-link a {
          color: #69c7b8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Create Court Courier</h1>

      <form id="create-game">
        <label for="game-key">Game key</label>
        <input id="game-key" name="game-key" type="password" autocomplete="current-password" required />

        <label for="game-title">Game name</label>
        <input id="game-title" name="game-title" value="Court Courier" required />

        <label for="players">Players, one per line</label>
        <textarea id="players" name="players" required>Monica
Player 2
Player 3
Player 4
Player 5</textarea>

        <div class="actions">
          <button id="create-button" type="submit">Create game</button>
        </div>

        <div id="status" class="status"></div>
      </form>

      <section id="result" class="hidden">
        <h2 id="result-title">Player links</h2>
        <div id="links" class="links"></div>
        <div class="actions">
          <button id="copy-links" type="button">Copy all links</button>
        </div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#create-game");
      const createButton = document.querySelector("#create-button");
      const statusEl = document.querySelector("#status");
      const resultEl = document.querySelector("#result");
      const resultTitleEl = document.querySelector("#result-title");
      const linksEl = document.querySelector("#links");
      const copyLinksButton = document.querySelector("#copy-links");
      let latestLinks = [];

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        createButton.disabled = true;
        statusEl.textContent = "Creating game...";

        const gameKey = document.querySelector("#game-key").value;
        const title = document.querySelector("#game-title").value;
        const players = document
          .querySelector("#players")
          .value.split("\n")
          .map((name) => name.trim())
          .filter(Boolean);

        try {
          const response = await fetch("/api/realtime?action=create-game", {
            method: "POST",
            headers: {
              "content-type": "application/json",
              "x-game-key": gameKey,
            },
            body: JSON.stringify({ title, players }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Could not create the game.");
          }

          renderLinks(data);
          statusEl.textContent = "Game created.";
        } catch (error) {
          statusEl.textContent = error.message;
        } finally {
          createButton.disabled = false;
        }
      });

      copyLinksButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(
          latestLinks.map((item) => `${item.name}: ${item.href}`).join("\n"),
        );
        statusEl.textContent = "Copied player links.";
      });

      function renderLinks(game) {
        latestLinks = game.players.map((player) => ({
          name: player.name,
          href: `${window.location.origin}${player.linkPath}`,
        }));

        resultTitleEl.textContent = `${game.title} links`;
        linksEl.replaceChildren(
          createSummary(game),
          ...latestLinks.map((item) => {
            const wrapper = document.createElement("div");
            wrapper.className = "player-link";

            const name = document.createElement("strong");
            name.textContent = item.name;

            const link = document.createElement("a");
            link.href = item.href;
            link.textContent = item.href;

            wrapper.append(name, link);
            return wrapper;
          }),
        );
        resultEl.classList.remove("hidden");
      }

      function createSummary(game) {
        const summary = document.createElement("p");
        summary.textContent = `First player to ${game.targetScore} points wins.`;
        return summary;
      }
    </script>
  </body>
</html>
