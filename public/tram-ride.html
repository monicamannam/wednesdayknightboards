<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tram Ride - Wednesday Knight Boards</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
        --sheet-url: url("https://i.imgur.com/ZKOFImc.jpeg");
        --sheet-width: 6163;
        --sheet-height: 3387;
        --card-width: 1086;
        --card-height: 1448;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #f7f4ee;
        color: #202124;
      }

      main {
        width: min(96vw, 86rem);
        margin: 0 auto;
        padding: 1.25rem 0 3rem;
      }

      h1 {
        margin: 0 0 0.25rem;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        letter-spacing: 0;
      }

      .status {
        min-height: 1.5rem;
        margin: 0 0 1rem;
        color: #5d5a54;
      }

      .section-title {
        margin: 1.5rem 0 0.75rem;
        color: #5d5a54;
        font-size: 0.9rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .station-row {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 1rem;
        align-items: start;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(10rem, 1fr));
        gap: 1rem;
        align-items: start;
      }

      figure {
        display: grid;
        gap: 0.55rem;
        margin: 0;
      }

      .card-frame {
        position: relative;
        width: 100%;
        aspect-ratio: var(--card-width) / var(--card-height);
        overflow: hidden;
        border: 1px solid #d9d1c2;
        border-radius: 8px;
        background: #fffdfa;
        box-shadow: 0 12px 28px rgb(38 32 24 / 12%);
      }

      .card-crop {
        position: absolute;
        top: 50%;
        left: 50%;
        width: var(--sprite-width);
        aspect-ratio: var(--crop-w) / var(--crop-h);
        background-image: var(--sheet-url);
        background-repeat: no-repeat;
        background-size:
          calc(var(--sheet-width) / var(--crop-w) * 100%)
          calc(var(--sheet-height) / var(--crop-h) * 100%);
        background-position:
          calc(var(--x) / (var(--sheet-width) - var(--crop-w)) * 100%)
          calc(var(--y) / (var(--sheet-height) - var(--crop-h)) * 100%);
        transform: translate(-50%, -50%) rotate(var(--rotation));
        transform-origin: center;
      }

      .passenger-counter {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.5rem;
        align-items: center;
        min-height: 2.4rem;
        padding: 0 0.75rem;
        border: 1px solid #d9d1c2;
        border-radius: 6px;
        background: #fffdfa;
        color: #5d5a54;
        font-weight: 700;
      }

      .passenger-counter strong {
        color: #202124;
        font-size: 1.25rem;
        font-variant-numeric: tabular-nums;
      }

      figcaption {
        color: #5d5a54;
        font-size: 0.92rem;
        font-weight: 700;
      }

      @media (max-width: 560px) {
        .station-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 0.75rem;
        }

        .card-grid {
          grid-template-columns: repeat(auto-fill, minmax(8.25rem, 1fr));
          gap: 0.75rem;
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #161616;
          color: #f3f1ec;
        }

        .status,
        .section-title,
        figcaption {
          color: #c8c2b8;
        }

        .passenger-counter,
        .card-frame {
          border-color: #3a3935;
          background: #22211f;
          box-shadow: none;
        }

        .passenger-counter strong {
          color: #f3f1ec;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Tram Ride</h1>
      <p id="status" class="status">Loading cards...</p>
      <h2 class="section-title">Stations</h2>
      <section id="stations" class="station-row" aria-label="Station cards"></section>
      <h2 class="section-title">Deck</h2>
      <section id="cards" class="card-grid" aria-label="Other Tram Ride cards"></section>
    </main>

    <script>
      const cardSheet = {
        width: 6163,
        height: 3387,
        cards: [
          {
            id: "card_01",
            type: "PASSENGER",
            color: "PURPLE",
            x: 94,
            y: 32,
            width: 1446,
            height: 1087,
            rotationAppliedDegrees: -90,
          },
          {
            id: "card_02",
            type: "STATION",
            color: "BLUE",
            x: 1572,
            y: 32,
            width: 1448,
            height: 1086,
            rotationAppliedDegrees: 0,
          },
          {
            id: "card_03",
            type: "STATION",
            color: "PURPLE",
            x: 3052,
            y: 63,
            width: 1536,
            height: 1024,
            rotationAppliedDegrees: 0,
          },
          {
            id: "card_04",
            type: "PASSENGER",
            color: "RED",
            x: 4620,
            y: 32,
            width: 1448,
            height: 1086,
            rotationAppliedDegrees: -90,
          },
          {
            id: "card_05",
            type: "TRAM",
            cost: 5,
            multiplier: 2,
            x: 32,
            y: 1220,
            width: 1659,
            height: 948,
            rotationAppliedDegrees: 0,
          },
          {
            id: "card_06",
            type: "PASSENGER",
            color: "*",
            x: 1723,
            y: 1151,
            width: 1448,
            height: 1086,
            rotationAppliedDegrees: -90,
          },
          {
            id: "card_07",
            type: "TRAM",
            cost: 15,
            multiplier: 4,
            x: 3203,
            y: 1151,
            width: 1448,
            height: 1086,
            rotationAppliedDegrees: 0,
          },
          {
            id: "card_08",
            type: "PASSENGER",
            color: "BLUE",
            x: 4683,
            y: 1151,
            width: 1448,
            height: 1086,
            rotationAppliedDegrees: -90,
          },
          {
            id: "card_09",
            type: "PASSENGER",
            color: "GREEN",
            x: 93,
            y: 2300,
            width: 1536,
            height: 1024,
            rotationAppliedDegrees: -90,
          },
          {
            id: "card_10",
            type: "STATION",
            color: "GREEN",
            x: 1661,
            y: 2269,
            width: 1448,
            height: 1086,
            rotationAppliedDegrees: 0,
          },
          {
            id: "card_11",
            type: "STATION",
            color: "RED",
            x: 3141,
            y: 2269,
            width: 1448,
            height: 1086,
            rotationAppliedDegrees: 0,
          },
          {
            id: "card_12",
            type: "TRAM",
            cost: 10,
            multiplier: 3,
            x: 4621,
            y: 2269,
            width: 1448,
            height: 1086,
            rotationAppliedDegrees: 0,
          },
        ],
      };

      const stationsEl = document.querySelector("#stations");
      const cardsEl = document.querySelector("#cards");
      const statusEl = document.querySelector("#status");
      const cardFrame = {
        width: 1086,
        height: 1448,
      };

      renderCards();

      function renderCards() {
        const stationCards = cardSheet.cards.filter((card) => card.type === "STATION");
        const otherCards = cardSheet.cards.filter((card) => card.type !== "STATION");

        stationsEl.replaceChildren(...stationCards.map(createStationCard));
        cardsEl.replaceChildren(...otherCards.map(createCardFigure));
        statusEl.textContent = `${cardSheet.cards.length} cards`;
      }

      function createStationCard(card) {
        const wrapper = document.createElement("div");
        const counter = document.createElement("div");
        const label = document.createElement("span");
        const count = document.createElement("strong");

        counter.className = "passenger-counter";
        label.textContent = "Passengers";
        count.textContent = "0";

        counter.append(label, count);
        wrapper.append(createCardFigure(card), counter);
        return wrapper;
      }

      function createCardFigure(card) {
        const figure = document.createElement("figure");
        const frame = document.createElement("div");
        const crop = document.createElement("div");
        const caption = document.createElement("figcaption");

        frame.className = "card-frame";
        crop.className = "card-crop";
        crop.style.setProperty("--x", card.x);
        crop.style.setProperty("--y", card.y);
        crop.style.setProperty("--crop-w", card.width);
        crop.style.setProperty("--crop-h", card.height);
        crop.style.setProperty("--sprite-width", `${getSpriteWidthPercent(card)}%`);
        crop.style.setProperty("--rotation", `${card.rotationAppliedDegrees}deg`);
        crop.setAttribute("role", "img");
        crop.setAttribute("aria-label", getCardLabel(card));

        caption.textContent = getCardLabel(card);
        frame.append(crop);
        figure.append(frame, caption);
        return figure;
      }

      function getSpriteWidthPercent(card) {
        const isRotated = card.rotationAppliedDegrees !== 0;
        const visualWidth = isRotated ? card.height : card.width;
        const visualHeight = isRotated ? card.width : card.height;
        const scale = Math.min(cardFrame.width / visualWidth, cardFrame.height / visualHeight);
        return (card.width * scale * 100) / cardFrame.width;
      }

      function getCardLabel(card) {
        if (card.type === "TRAM") {
          return `${card.id}: Tram $${card.cost} x${card.multiplier}`;
        }

        const color = card.color === "*" ? "wild" : card.color.toLowerCase();
        return `${card.id}: ${color} ${card.type.toLowerCase()}`;
      }
    </script>
  </body>
</html>
