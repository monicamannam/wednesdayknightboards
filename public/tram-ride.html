<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tram Ride - Wednesday Knight Boards</title>
    <link rel="stylesheet" href="/tramride/tram-ride.css" />
    <script src="/tramride/tram-ride.js" defer></script>
  </head>
  <body>
    <main>
      <h1>Tram Ride</h1>
      <p id="status" class="status">Loading cards...</p>
      <section class="game-topbar" aria-label="Game state">
        <div class="money-board" aria-label="Player money">
          <div class="money-row">
            <span>Player 1</span>
            <span class="player-values">
              <strong id="player-1-money">$9999</strong>
              <strong id="player-1-score">0 VP</strong>
            </span>
          </div>
          <div class="money-row">
            <span>Player 2</span>
            <span class="player-values">
              <strong id="player-2-money">$9999</strong>
              <strong id="player-2-score">0 VP</strong>
            </span>
          </div>
          <div class="money-row">
            <span>Passenger deck</span>
            <strong id="passenger-deck-count">120</strong>
          </div>
          <div class="money-row">
            <span>Discard pile</span>
            <strong id="passenger-discard-count">0</strong>
          </div>
        </div>
        <div class="tram-count-board" aria-label="Trams left">
          <div class="tram-count-row">
            <span>Tours</span>
            <strong id="tour-count">0</strong>
          </div>
          <div class="tram-count-row">
            <span>Horse</span>
            <strong id="horse-tram-count">5</strong>
          </div>
          <div class="tram-count-row">
            <span>Steam</span>
            <strong id="steam-tram-count">4</strong>
          </div>
          <div class="tram-count-row">
            <span>Electric</span>
            <strong id="electric-tram-count">7</strong>
          </div>
        </div>
      </section>
      <h2 class="section-title">Trams</h2>
      <section id="tram-market" class="tram-market" aria-label="Available trams"></section>
      <h2 class="section-title">Stations</h2>
      <section id="stations" class="station-row" aria-label="Station cards"></section>
      <h2 class="section-title">Player 1 Hand</h2>
      <section id="player-hand" class="card-grid hand-grid" aria-label="Player 1 hand"></section>
    </main>
  </body>
</html>
