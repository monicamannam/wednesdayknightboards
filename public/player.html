<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Court Courier - Wednesday Knight Boards</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #f7f4ee;
        color: #202124;
      }

      main {
        width: min(94vw, 72rem);
        margin: 0 auto;
        padding: 1.25rem 0 3rem;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0.25rem;
        font-size: clamp(1.8rem, 4vw, 2.7rem);
        letter-spacing: 0;
      }

      h2 {
        margin-bottom: 0.75rem;
        font-size: 1.1rem;
      }

      h3 {
        margin-bottom: 0.4rem;
        font-size: 1rem;
      }

      button,
      select {
        min-height: 2.8rem;
        border-radius: 6px;
        font: inherit;
      }

      button {
        border: 0;
        padding: 0 1rem;
        background: #176b5d;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        border: 1px solid #c8c0b1;
        background: #fffdfa;
        color: #202124;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      select {
        width: 100%;
        border: 1px solid #c8c0b1;
        padding: 0 0.75rem;
        background: white;
        color: #202124;
      }

      .topbar,
      .panel {
        border: 1px solid #d9d1c2;
        border-radius: 8px;
        background: #fffdfa;
      }

      .topbar {
        display: grid;
        gap: 1rem;
        padding: 1.25rem;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        color: #5d5a54;
      }

      .meta span {
        padding: 0.25rem 0.55rem;
        border: 1px solid #ddd5c8;
        border-radius: 999px;
        background: #f9f6ef;
        font-size: 0.9rem;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(18rem, 0.9fr);
        gap: 1rem;
        margin-top: 1rem;
      }

      .panel {
        padding: 1rem;
      }

      .hand {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
        gap: 0.75rem;
      }

      .card-button {
        min-height: 10rem;
        padding: 1rem;
        border: 2px solid #d9d1c2;
        background: #f9f6ef;
        color: #202124;
        text-align: left;
      }

      .card-button[aria-pressed="true"] {
        border-color: #176b5d;
        box-shadow: 0 0 0 3px rgb(23 107 93 / 18%);
      }

      .card-value {
        display: inline-grid;
        width: 2rem;
        height: 2rem;
        place-items: center;
        border-radius: 999px;
        background: #176b5d;
        color: white;
        font-weight: 800;
      }

      .card-name {
        display: block;
        margin-top: 0.85rem;
        font-size: 1.35rem;
        font-weight: 800;
      }

      .card-text {
        display: block;
        margin-top: 0.45rem;
        color: #5d5a54;
        font-weight: 500;
      }

      .controls {
        display: grid;
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .players {
        display: grid;
        gap: 0.6rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .player-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.5rem;
        padding: 0.7rem;
        border: 1px solid #e4ddd1;
        border-radius: 8px;
        background: #f9f6ef;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        grid-column: 1 / -1;
      }

      .tag {
        color: #5d5a54;
        font-size: 0.85rem;
      }

      .log {
        margin: 0;
        padding-left: 1.15rem;
      }

      .log li {
        margin: 0.35rem 0;
      }

      .status {
        min-height: 1.5rem;
        margin: 1rem 0 0;
        color: #5d5a54;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #161616;
          color: #f3f1ec;
        }

        .topbar,
        .panel {
          border-color: #3a3935;
          background: #22211f;
        }

        .meta,
        .status,
        .tag,
        .card-text {
          color: #c8c2b8;
        }

        .meta span,
        .player-row,
        .card-button {
          border-color: #3a3935;
          background: #1b1a19;
          color: #f3f1ec;
        }

        button.secondary,
        select {
          border-color: #504d46;
          background: #171717;
          color: #f3f1ec;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="topbar">
        <div>
          <p class="status" id="you">Loading player...</p>
          <h1 id="title">Loading game...</h1>
          <div class="meta">
            <span id="round">Round ...</span>
            <span id="turn">Turn ...</span>
            <span id="deck">Deck ...</span>
            <span id="target-score">Goal ...</span>
          </div>
        </div>
        <p id="status" class="status">Connecting...</p>
      </section>

      <div class="grid">
        <section class="panel">
          <h2 id="action-title">Your hand</h2>
          <div id="hand" class="hand"></div>

          <div id="controls" class="controls hidden">
            <select id="target-select" class="hidden"></select>
            <select id="guess-select" class="hidden"></select>
            <button id="play-card" type="button" disabled>Play selected card</button>
          </div>

          <button id="start-round" class="secondary hidden" type="button">Start next round</button>
        </section>

        <section class="panel">
          <h2>Table</h2>
          <ul id="players" class="players"></ul>
        </section>

        <section class="panel">
          <h2>Private notes</h2>
          <ol id="private-log" class="log"></ol>
        </section>

        <section class="panel">
          <h2>Round log</h2>
          <ol id="round-log" class="log"></ol>
        </section>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const gameId = params.get("game");
      const playerToken = params.get("token");
      const titleEl = document.querySelector("#title");
      const youEl = document.querySelector("#you");
      const roundEl = document.querySelector("#round");
      const turnEl = document.querySelector("#turn");
      const deckEl = document.querySelector("#deck");
      const targetScoreEl = document.querySelector("#target-score");
      const actionTitleEl = document.querySelector("#action-title");
      const statusEl = document.querySelector("#status");
      const handEl = document.querySelector("#hand");
      const controlsEl = document.querySelector("#controls");
      const targetSelect = document.querySelector("#target-select");
      const guessSelect = document.querySelector("#guess-select");
      const playCardButton = document.querySelector("#play-card");
      const startRoundButton = document.querySelector("#start-round");
      const playersEl = document.querySelector("#players");
      const privateLogEl = document.querySelector("#private-log");
      const roundLogEl = document.querySelector("#round-log");
      let currentVersion = 0;
      let selectedCard = null;
      let latestGame = null;
      let reconnectTimer;

      async function loadGame(message = "") {
        if (!gameId || !playerToken) {
          throw new Error("This player link is missing its game or token.");
        }

        const response = await fetch(
          `/api/realtime?action=game&gameId=${encodeURIComponent(gameId)}&playerToken=${encodeURIComponent(playerToken)}`,
          { cache: "no-store" },
        );
        const game = await readResponse(response);
        if (!response.ok) {
          throw new Error(game.error || "Could not load the game.");
        }

        renderGame(game);
        if (message) {
          statusEl.textContent = message;
        }
      }

      async function playSelectedCard() {
        if (!selectedCard) {
          return;
        }

        playCardButton.disabled = true;
        statusEl.textContent = "Playing card...";

        try {
          const response = await fetch("/api/realtime?action=play-card", {
            method: "POST",
            headers: {
              "content-type": "application/json",
            },
            body: JSON.stringify({
              gameId,
              playerToken,
              cardId: selectedCard.id,
              targetId: targetSelect.classList.contains("hidden") ? null : targetSelect.value,
              guessKey: guessSelect.classList.contains("hidden") ? null : guessSelect.value,
            }),
          });
          const game = await readResponse(response);
          if (!response.ok) {
            throw new Error(game.error || "Could not play that card.");
          }

          selectedCard = null;
          renderGame(game);
          statusEl.textContent = "Card played. Everyone else was notified.";
        } catch (error) {
          statusEl.textContent = error.message;
          updatePlayButton();
        }
      }

      async function startNextRound() {
        startRoundButton.disabled = true;
        statusEl.textContent = "Starting next round...";

        try {
          const response = await fetch("/api/realtime?action=start-round", {
            method: "POST",
            headers: {
              "content-type": "application/json",
            },
            body: JSON.stringify({ gameId, playerToken }),
          });
          const game = await readResponse(response);
          if (!response.ok) {
            throw new Error(game.error || "Could not start the next round.");
          }

          selectedCard = null;
          renderGame(game);
          statusEl.textContent = "Next round started.";
        } catch (error) {
          statusEl.textContent = error.message;
          startRoundButton.disabled = false;
        }
      }

      function renderGame(game) {
        latestGame = game;
        currentVersion = game.version;
        titleEl.textContent = game.title;
        youEl.textContent = `You are ${game.you.name}`;
        roundEl.textContent = `Round ${game.roundNumber}`;
        turnEl.textContent =
          game.roundStatus === "active" ? `${game.currentPlayerName}'s turn` : "Round over";
        deckEl.textContent = `${game.deckCount} cards left`;
        targetScoreEl.textContent = `First to ${game.targetScore}`;

        if (game.status === "finished") {
          actionTitleEl.textContent = `${game.gameWinnerNames.join(", ")} won the game`;
        } else if (game.roundStatus === "over") {
          actionTitleEl.textContent = game.roundSummary;
        } else if (game.isYourTurn) {
          actionTitleEl.textContent = "Choose a card to play";
        } else {
          actionTitleEl.textContent = `Waiting for ${game.currentPlayerName}`;
        }

        renderHand(game);
        renderPlayers(game);
        renderLog(privateLogEl, game.you.privateLog, "No private notes yet.");
        renderLog(roundLogEl, game.log, "No public moves yet.");

        controlsEl.classList.toggle("hidden", !game.isYourTurn || game.roundStatus !== "active");
        startRoundButton.classList.toggle("hidden", !game.canStartRound);
        startRoundButton.disabled = !game.canStartRound;
        statusEl.textContent = getStatusText(game);
        updateControls();
      }

      function renderHand(game) {
        handEl.replaceChildren(
          ...game.you.hand.map((card) => {
            const button = document.createElement("button");
            button.className = "card-button";
            button.type = "button";
            button.disabled = !card.playable;
            button.setAttribute("aria-pressed", selectedCard?.id === card.id ? "true" : "false");
            button.addEventListener("click", () => {
              selectedCard = selectedCard?.id === card.id ? null : card;
              renderHand(latestGame);
              updateControls();
            });

            const value = document.createElement("span");
            value.className = "card-value";
            value.textContent = card.value;

            const name = document.createElement("span");
            name.className = "card-name";
            name.textContent = card.name;

            const text = document.createElement("span");
            text.className = "card-text";
            text.textContent = card.text;

            button.append(value, name, text);
            return button;
          }),
        );
      }

      function renderPlayers(game) {
        playersEl.replaceChildren(
          ...game.players.map((player) => {
            const item = document.createElement("li");
            item.className = "player-row";

            const name = document.createElement("strong");
            name.textContent = player.isYou ? `${player.name} (you)` : player.name;

            const score = document.createElement("span");
            score.textContent = `${player.score} pts`;

            const tags = document.createElement("div");
            tags.className = "tags";
            const labels = [];
            if (player.isCurrent && game.roundStatus === "active") labels.push("up now");
            if (player.eliminated) labels.push("out");
            if (player.protected) labels.push("protected");
            labels.push(`${player.handCount} in hand`);
            if (player.discard.length > 0) {
              labels.push(`discarded ${player.discard.map((card) => card.name).join(", ")}`);
            }

            for (const label of labels) {
              const tag = document.createElement("span");
              tag.className = "tag";
              tag.textContent = label;
              tags.append(tag);
            }

            item.append(name, score, tags);
            return item;
          }),
        );
      }

      function renderLog(container, items, emptyText) {
        const entries = items.length > 0 ? items : [emptyText];
        container.replaceChildren(
          ...entries.map((text) => {
            const item = document.createElement("li");
            item.textContent = text;
            return item;
          }),
        );
      }

      function updateControls() {
        if (!latestGame || !selectedCard || !latestGame.isYourTurn) {
          targetSelect.classList.add("hidden");
          guessSelect.classList.add("hidden");
          updatePlayButton();
          return;
        }

        const needsTarget = selectedCard.target !== "none";
        targetSelect.classList.toggle("hidden", !needsTarget);
        if (needsTarget) {
          const targets = latestGame.players.filter((player) => {
            if (!player.targetable) return false;
            return selectedCard.target === "any" || !player.isYou;
          });
          const options = targets.map((player) => {
            const option = document.createElement("option");
            option.value = player.id;
            option.textContent = player.isYou ? `${player.name} (you)` : player.name;
            return option;
          });
          if (options.length === 0) {
            const option = document.createElement("option");
            option.value = "";
            option.textContent = "No valid target";
            options.push(option);
          }
          targetSelect.replaceChildren(...options);
        }

        guessSelect.classList.toggle("hidden", !selectedCard.guess);
        if (selectedCard.guess) {
          guessSelect.replaceChildren(
            ...latestGame.guessOptions.map((card) => {
              const option = document.createElement("option");
              option.value = card.key;
              option.textContent = `${card.name} (${card.value})`;
              return option;
            }),
          );
        }

        updatePlayButton();
      }

      function updatePlayButton() {
        const targetReady =
          !selectedCard ||
          selectedCard.target === "none" ||
          (!targetSelect.classList.contains("hidden") && targetSelect.options.length > 0);
        playCardButton.disabled =
          !latestGame || !latestGame.isYourTurn || !selectedCard || !selectedCard.playable || !targetReady;
      }

      function getStatusText(game) {
        if (game.status === "finished") {
          return "Game complete.";
        }
        if (game.roundStatus === "over") {
          return "Round complete. Start the next round when everyone is ready.";
        }
        if (game.you.eliminated) {
          return "You are out for this round.";
        }
        if (game.isYourTurn) {
          return "Your move.";
        }
        return "Connected.";
      }

      async function readResponse(response) {
        const text = await response.text();
        try {
          return text ? JSON.parse(text) : {};
        } catch {
          return {
            error: text || `Request failed with status ${response.status}.`,
          };
        }
      }

      function connectSocket() {
        clearTimeout(reconnectTimer);
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const socket = new WebSocket(`${protocol}//${window.location.host}/api/realtime`);

        socket.addEventListener("open", () => {
          statusEl.textContent = latestGame ? getStatusText(latestGame) : "Connected.";
        });

        socket.addEventListener("message", async (event) => {
          let message;
          try {
            message = JSON.parse(event.data);
          } catch {
            return;
          }

          if (
            message.type === "game-updated" &&
            message.gameId === gameId &&
            message.version > currentVersion
          ) {
            selectedCard = null;
            await loadGame("Game updated.");
          }
        });

        socket.addEventListener("close", () => {
          statusEl.textContent = "Disconnected. Reconnecting...";
          reconnectTimer = window.setTimeout(connectSocket, 1500);
        });

        socket.addEventListener("error", () => {
          socket.close();
        });
      }

      playCardButton.addEventListener("click", playSelectedCard);
      targetSelect.addEventListener("change", updatePlayButton);
      guessSelect.addEventListener("change", updatePlayButton);
      startRoundButton.addEventListener("click", startNextRound);

      loadGame()
        .then(connectSocket)
        .catch((error) => {
          titleEl.textContent = "Could not load game";
          statusEl.textContent = error.message;
        });
    </script>
  </body>
</html>
