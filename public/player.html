<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Player - Wednesday Knight Boards</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f7f4ee;
        color: #202124;
      }

      main {
        width: min(94vw, 34rem);
        padding: 1.5rem;
        border: 1px solid #d9d1c2;
        border-radius: 8px;
        background: #fffdfa;
      }

      h1 {
        margin: 0;
        font-size: 1.6rem;
      }

      .eyebrow {
        margin: 0 0 0.3rem;
        color: #5d5a54;
        font-size: 0.95rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .turn {
        margin: 1.25rem 0;
        padding: 1rem;
        border: 1px solid #d9d1c2;
        border-radius: 8px;
        background: #f9f6ef;
      }

      .turn strong {
        display: block;
        font-size: 2rem;
      }

      ul {
        margin: 1rem 0;
        padding: 0;
        list-style: none;
      }

      li {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.55rem 0;
        border-bottom: 1px solid #e4ddd1;
      }

      li:last-child {
        border-bottom: 0;
      }

      button {
        width: 100%;
        min-height: 3rem;
        border: 0;
        border-radius: 6px;
        background: #176b5d;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .status {
        min-height: 1.5rem;
        margin-top: 1rem;
        color: #5d5a54;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #161616;
          color: #f3f1ec;
        }

        main,
        .turn {
          border-color: #3a3935;
          background: #22211f;
        }

        .turn {
          background: #1b1a19;
        }

        li {
          border-bottom-color: #3a3935;
        }

        .eyebrow,
        .status {
          color: #c8c2b8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow" id="you">Loading player...</p>
      <h1 id="title">Loading game...</h1>

      <div class="turn">
        <span>Current turn</span>
        <strong id="current-player">...</strong>
        <span id="turn-number">Turn ...</span>
      </div>

      <button id="end-turn" type="button" disabled>End turn</button>
      <ul id="players"></ul>
      <div id="status" class="status">Connecting...</div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const gameId = params.get("game");
      const playerToken = params.get("token");
      const titleEl = document.querySelector("#title");
      const youEl = document.querySelector("#you");
      const currentPlayerEl = document.querySelector("#current-player");
      const turnNumberEl = document.querySelector("#turn-number");
      const playersEl = document.querySelector("#players");
      const endTurnButton = document.querySelector("#end-turn");
      const statusEl = document.querySelector("#status");
      let currentVersion = 0;
      let reconnectTimer;

      async function loadGame() {
        if (!gameId || !playerToken) {
          throw new Error("This player link is missing its game or token.");
        }

        const response = await fetch(
          `/api/realtime?action=game&gameId=${encodeURIComponent(gameId)}&playerToken=${encodeURIComponent(playerToken)}`,
          { cache: "no-store" },
        );
        const game = await response.json();
        if (!response.ok) {
          throw new Error(game.error || "Could not load the game.");
        }

        renderGame(game);
      }

      async function endTurn() {
        endTurnButton.disabled = true;
        statusEl.textContent = "Ending turn...";

        try {
          const response = await fetch("/api/realtime?action=end-turn", {
            method: "POST",
            headers: {
              "content-type": "application/json",
            },
            body: JSON.stringify({ gameId, playerToken }),
          });
          const game = await response.json();
          if (!response.ok) {
            throw new Error(game.error || "Could not end the turn.");
          }

          renderGame(game);
          statusEl.textContent = "Turn ended. Everyone else was notified.";
        } catch (error) {
          statusEl.textContent = error.message;
        }
      }

      function renderGame(game) {
        currentVersion = game.version;
        titleEl.textContent = game.title;
        youEl.textContent = `You are ${game.you.name}`;
        currentPlayerEl.textContent = game.currentPlayerName;
        turnNumberEl.textContent = `Turn ${game.turnNumber}`;
        endTurnButton.disabled = !game.isYourTurn;

        playersEl.replaceChildren(
          ...game.players.map((player) => {
            const item = document.createElement("li");
            const name = document.createElement("span");
            const state = document.createElement("strong");

            name.textContent = player.isYou ? `${player.name} (you)` : player.name;
            state.textContent = player.isCurrent ? "Up now" : "";

            item.append(name, state);
            return item;
          }),
        );
      }

      function connectSocket() {
        clearTimeout(reconnectTimer);
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const socket = new WebSocket(`${protocol}//${window.location.host}/api/realtime`);

        socket.addEventListener("open", () => {
          statusEl.textContent = "Connected.";
        });

        socket.addEventListener("message", async (event) => {
          let message;
          try {
            message = JSON.parse(event.data);
          } catch {
            return;
          }

          if (
            message.type === "game-updated" &&
            message.gameId === gameId &&
            message.version > currentVersion
          ) {
            statusEl.textContent = "The game changed. Refreshing...";
            window.location.reload();
          }
        });

        socket.addEventListener("close", () => {
          statusEl.textContent = "Disconnected. Reconnecting...";
          reconnectTimer = window.setTimeout(connectSocket, 1500);
        });

        socket.addEventListener("error", () => {
          socket.close();
        });
      }

      endTurnButton.addEventListener("click", endTurn);

      loadGame()
        .then(connectSocket)
        .catch((error) => {
          titleEl.textContent = "Could not load game";
          statusEl.textContent = error.message;
        });
    </script>
  </body>
</html>
