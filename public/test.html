<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wednesday Knight Boards Test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f4f1ea;
        color: #202124;
      }

      main {
        width: min(92vw, 28rem);
        padding: 2rem;
        border: 1px solid #d8d2c4;
        border-radius: 8px;
        background: #fffdfa;
        box-shadow: 0 18px 48px rgb(38 32 24 / 12%);
      }

      h1 {
        margin: 0 0 1rem;
        font-size: 1.3rem;
        font-weight: 700;
      }

      .count {
        margin: 1rem 0;
        font-size: 5rem;
        font-weight: 800;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      button {
        width: 100%;
        min-height: 3rem;
        border: 0;
        border-radius: 6px;
        background: #176b5d;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status {
        min-height: 1.5rem;
        margin-top: 1rem;
        color: #5d5a54;
        font-size: 0.95rem;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #161616;
          color: #f3f1ec;
        }

        main {
          border-color: #3a3935;
          background: #22211f;
        }

        .status {
          color: #c8c2b8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Shared counter test</h1>
      <div id="count" class="count">...</div>
      <button id="increment" type="button">Increment</button>
      <div id="status" class="status">Connecting...</div>
    </main>

    <script>
      const countEl = document.querySelector("#count");
      const button = document.querySelector("#increment");
      const statusEl = document.querySelector("#status");
      const clientId =
        window.crypto?.randomUUID?.() ??
        `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      let currentVersion = 0;
      let reconnectTimer;

      async function loadState() {
        const response = await fetch("/api/realtime?action=state", {
          cache: "no-store",
        });
        if (!response.ok) {
          throw new Error("Could not load the counter.");
        }

        const state = await response.json();
        countEl.textContent = state.count;
        currentVersion = state.version;
      }

      async function increment() {
        button.disabled = true;
        try {
          const response = await fetch("/api/realtime?action=increment", {
            method: "POST",
            headers: {
              "content-type": "application/json",
            },
            body: JSON.stringify({ senderId: clientId }),
          });
          if (!response.ok) {
            throw new Error("Could not increment the counter.");
          }

          const state = await response.json();
          countEl.textContent = state.count;
          currentVersion = state.version;
          statusEl.textContent = "Incremented. Other browsers were notified.";
        } catch (error) {
          statusEl.textContent = error.message;
        } finally {
          button.disabled = false;
        }
      }

      function connectSocket() {
        clearTimeout(reconnectTimer);
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const socket = new WebSocket(`${protocol}//${window.location.host}/api/realtime`);

        socket.addEventListener("open", () => {
          statusEl.textContent = "Connected. Open this page on another device.";
        });

        socket.addEventListener("message", async (event) => {
          let message;
          try {
            message = JSON.parse(event.data);
          } catch {
            return;
          }

          if (
            message.type === "counter-updated" &&
            message.senderId !== clientId &&
            message.version > currentVersion
          ) {
            statusEl.textContent = "Another browser changed the counter. Refreshing...";
            await loadState();
            window.location.reload();
          }
        });

        socket.addEventListener("close", () => {
          statusEl.textContent = "Disconnected. Reconnecting...";
          reconnectTimer = window.setTimeout(connectSocket, 1500);
        });

        socket.addEventListener("error", () => {
          socket.close();
        });
      }

      button.addEventListener("click", increment);

      loadState()
        .then(connectSocket)
        .catch((error) => {
          countEl.textContent = "!";
          statusEl.textContent = error.message;
        });
    </script>
  </body>
</html>
