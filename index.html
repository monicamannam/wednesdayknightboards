<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wednesday Knight Boards</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f7f4ee;
        color: #202124;
      }

      main {
        width: min(92vw, 34rem);
        padding: 1.5rem;
        border: 1px solid #d9d1c2;
        border-radius: 8px;
        background: #fffdfa;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.8rem;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #5d5a54;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #161616;
          color: #f3f1ec;
        }

        main {
          border-color: #3a3935;
          background: #22211f;
        }

        p {
          color: #c8c2b8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Wednesday Knight Boards</h1>
      <p>Use the player link for your game to join your turn page.</p>
    </main>
  </body>
</html>
